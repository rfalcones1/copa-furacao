<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Furacão</title>

<style>
body{margin:0;font-family:Arial;background:#080808;color:white}
header{background:#c8102e;padding:16px;text-align:center;font-size:22px;font-weight:bold}
.tabs,.nav{display:flex;background:#111}
.tab,.nav button{flex:1;padding:12px;font-weight:bold;border:none;color:white;background:#222;font-size:13px}
.tab.active,.nav button.active{background:#c8102e}
.container{padding:14px}
.section{background:#151515;margin-bottom:16px;padding:14px;border-radius:12px}
label{display:block;margin-top:10px;font-weight:bold;color:#ddd;text-transform:uppercase;font-size:13px}
input,select{width:100%;padding:12px;margin-top:5px;border-radius:10px;border:none;font-size:16px;text-align:center;box-sizing:border-box}
button{width:100%;padding:14px;margin-top:14px;background:#c8102e;color:white;border:none;border-radius:10px;font-weight:bold}
.small{background:#333;margin-top:8px}
.field{background:#126b35;border:3px solid white;border-radius:18px;padding:14px;margin-top:10px}
.pos{background:rgba(255,255,255,.15);border:1px solid white;border-radius:12px;padding:10px;margin:8px 0;text-align:center}
.pos-title{font-weight:bold;margin-bottom:6px}
.game{margin-top:10px;padding:12px;border-radius:9px}
.win{background:#167a37}
.draw{background:#a98208}
.loss{background:#84241c}
.readonly{background:#004d22;padding:10px;text-align:center;font-weight:bold}
.sharebox{word-break:break-all;background:#222;padding:10px;border-radius:8px;margin-top:10px}
table{width:100%;border-collapse:collapse;text-align:center;font-size:13px}
th,td{padding:7px;border-bottom:1px solid #333}
.goal-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.goal-row select{flex:2}
.goal-row input{flex:1}
.goal-row button{flex:1;margin-top:5px;padding:10px}
</style>
</head>

<body>

<header>Copa Furacão</header>
<div id="aviso"></div>

<div class="tabs">
  <div class="tab active" onclick="trocarCategoria('sub11',this)">Sub11</div>
  <div class="tab" onclick="trocarCategoria('sub12',this)">Sub12</div>
  <div class="tab" onclick="trocarCategoria('sub13',this)">Sub13</div>
</div>

<div class="container">

<div class="nav">
  <button class="active" onclick="mostrar('jogos',this)">Jogos</button>
  <button id="btnCad" onclick="mostrar('cadastros',this)">Cadastros</button>
  <button onclick="mostrar('tabelaTela',this)">Tabela</button>
  <button id="btnFalcao" onclick="mostrar('falcao',this)">Falcão</button>
  <button id="btnShare" onclick="mostrar('share',this)">Compartilhar</button>
</div>

<div id="cadastros" style="display:none">
  <div class="section">
    <h3>Cadastro de adversários</h3>
    <input id="novoTime" placeholder="Nome do adversário">
    <button onclick="addTime()">Adicionar adversário</button>
    <div id="listaTimes"></div>
  </div>

  <div class="section">
    <h3>Cadastro de jogadores</h3>
    <input id="novoJogador" placeholder="Nome do jogador">
    <button onclick="addJogador()">Adicionar jogador</button>
    <div id="listaJogadores"></div>
  </div>
</div>

<div id="jogos">
  <div id="formJogo" class="section">
    <h3 id="tituloForm">Novo jogo</h3>

    <label>Time A</label>
    <input value="Furacão CL" readonly>

    <label>Adversário</label>
    <select id="timeB"></select>

    <label>Gols Furacão CL</label>
    <input id="golsA" type="number">

    <label>Gols adversário</label>
    <input id="golsB" type="number">

    <label>Jogo em casa ou fora</label>
    <select id="localJogo">
      <option value="Casa">Casa</option>
      <option value="Fora">Fora</option>
    </select>

    <label>Craque da partida</label>
    <select id="craque"></select>

    <h3>Escalação Furacão CL</h3>

    <div class="field">
      <div class="pos"><div class="pos-title">GOL</div><select id="gol"></select></div>
      <div class="pos"><div class="pos-title">ZAGUEIRO</div><select id="zagueiro"></select></div>
      <div class="pos"><div class="pos-title">VOLANTE</div><select id="volante"></select></div>
      <div class="pos"><div class="pos-title">ALA ESQ</div><select id="alaEsq"></select></div>
      <div class="pos"><div class="pos-title">ALA DIR</div><select id="alaDir"></select></div>
      <div class="pos"><div class="pos-title">MEIA</div><select id="meia"></select></div>
      <div class="pos"><div class="pos-title">ATACANTE</div><select id="atacante"></select></div>
    </div>

    <h3>Gols por jogador</h3>
    <div id="golsJogadores"></div>
    <button class="small" onclick="addLinhaGol()">Adicionar jogador que fez gol</button>

    <button onclick="salvarJogo()">Salvar jogo</button>
    <button id="btnCancelarEdicao" class="small" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button>
  </div>

  <div class="section">
    <h3>Jogos cadastrados</h3>
    <div id="games"></div>
  </div>
</div>

<div id="tabelaTela" style="display:none">
  <div class="section">
    <h3>Tabela de classificação</h3>
    <div id="tabela"></div>
  </div>
</div>

<div id="falcao" style="display:none">
  <div id="formFalcao" class="section">
    <h3>Registro Falcão</h3>

    <label>Selecionar jogo</label>
    <select id="jogoSel"></select>

    <label>Participação do Falcão</label>
    <select id="tempoFalcao">
      <option value="Jogo inteiro">Jogo inteiro</option>
      <option value="1º Tempo">1º Tempo</option>
      <option value="2º Tempo">2º Tempo</option>
    </select>

    <label>Gols sofridos Falcão</label>
    <select id="gF"></select>

    <label>Gols sofridos outro goleiro</label>
    <select id="gO"></select>

    <button onclick="salvarFalcao()">Salvar desempenho</button>
  </div>

  <div class="section">
    <h3>Resumo Falcão por categoria</h3>
    <div id="res"></div>
  </div>
</div>

<div id="share" style="display:none">
  <div class="section">
    <h3>Compartilhar</h3>

    <label>
      <input type="checkbox" id="shareFalcao">
      Compartilhar aba Falcão
    </label>

    <button onclick="gerar()">Gerar link somente leitura</button>
    <div id="link" class="sharebox"></div>
  </div>
</div>

</div>

<script>
let categoria="sub11";
let leitura=false;
let permiteFalcao=true;
let editIndex=null;

let dados=JSON.parse(localStorage.getItem("copaFuracaoGolsJogador"))||{
  sub11:{times:[],jogadores:[],jogos:[]},
  sub12:{times:[],jogadores:[],jogos:[]},
  sub13:{times:[],jogadores:[],jogos:[]}
};

function salvar(){
  if(!leitura)localStorage.setItem("copaFuracaoGolsJogador",JSON.stringify(dados));
}

function carregar(){
  let p=new URLSearchParams(location.search);
  let s=p.get("share");
  let f=p.get("falcao");

  if(s){
    try{
      dados=JSON.parse(decodeURIComponent(escape(atob(s))));
      leitura=true;
      permiteFalcao=f==="sim";

      aviso.innerHTML='<div class="readonly">Modo compartilhado: somente leitura</div>';
      btnCad.style.display="none";
      btnShare.style.display="none";
      formJogo.style.display="none";

      if(!permiteFalcao){
        btnFalcao.style.display="none";
      }else{
        formFalcao.style.display="none";
      }
    }catch(e){
      alert("Link inválido.");
    }
  }
}

function trocarCategoria(c,el){
  categoria=c;
  editIndex=null;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  cancelarEdicao();
  render();
}

function mostrar(id,el){
  jogos.style.display="none";
  cadastros.style.display="none";
  tabelaTela.style.display="none";
  falcao.style.display="none";
  share.style.display="none";

  document.getElementById(id).style.display="block";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  render();
}

function addTime(){
  let n=novoTime.value.trim();
  if(!n)return;
  dados[categoria].times.push(n);
  novoTime.value="";
  salvar();
  render();
}

function addJogador(){
  let n=novoJogador.value.trim();
  if(!n)return;
  dados[categoria].jogadores.push(n);
  novoJogador.value="";
  salvar();
  render();
}

function opcoesJogadores(valor=""){
  return '<option value="">Selecione</option>'+
  dados[categoria].jogadores.map(j=>`<option value="${j}" ${j===valor?"selected":""}>${j}</option>`).join("");
}

function opcoesGols(valor=0){
  let h="";
  for(let i=0;i<=20;i++)h+=`<option value="${i}" ${i==valor?"selected":""}>${i}</option>`;
  return h;
}

function addLinhaGol(jogador="", qtd=1){
  let div=document.createElement("div");
  div.className="goal-row";
  div.innerHTML=`
    <select class="golJogador">${opcoesJogadores(jogador)}</select>
    <input class="qtdGolJogador" type="number" min="0" value="${qtd}">
    <button type="button" onclick="this.parentElement.remove()">X</button>
  `;
  golsJogadores.appendChild(div);
}

function obterGolsJogadores(){
  let lista=[];
  document.querySelectorAll(".goal-row").forEach(row=>{
    let jogador=row.querySelector(".golJogador").value;
    let gols=Number(row.querySelector(".qtdGolJogador").value||0);
    if(jogador && gols>0){
      lista.push({jogador,gols});
    }
  });
  return lista;
}

function salvarJogo(){
  if(!timeB.value){
    alert("Selecione o adversário.");
    return;
  }

  let jogo={
    timeB:timeB.value,
    golsA:Number(golsA.value||0),
    golsB:Number(golsB.value||0),
    local:localJogo.value,
    craque:craque.value,
    campo:{
      gol:gol.value,
      zagueiro:zagueiro.value,
      volante:volante.value,
      alaEsq:alaEsq.value,
      alaDir:alaDir.value,
      meia:meia.value,
      atacante:atacante.value
    },
    golsJogadores:obterGolsJogadores(),
    tempoFalcao:"Jogo inteiro",
    gF:0,
    gO:0
  };

  if(editIndex!==null){
    let antigo=dados[categoria].jogos[editIndex];
    jogo.tempoFalcao=antigo.tempoFalcao || "Jogo inteiro";
    jogo.gF=antigo.gF || 0;
    jogo.gO=antigo.gO || 0;
    dados[categoria].jogos[editIndex]=jogo;
  }else{
    dados[categoria].jogos.push(jogo);
  }

  limparFormulario();
  salvar();
  render();
}

function editarJogo(i){
  let g=dados[categoria].jogos[i];
  editIndex=i;

  tituloForm.innerText="Editar jogo";
  btnCancelarEdicao.style.display="block";

  timeB.value=g.timeB;
  golsA.value=g.golsA;
  golsB.value=g.golsB;
  localJogo.value=g.local || "Casa";
  craque.value=g.craque || "";

  gol.value=g.campo?.gol || "";
  zagueiro.value=g.campo?.zagueiro || "";
  volante.value=g.campo?.volante || "";
  alaEsq.value=g.campo?.alaEsq || "";
  alaDir.value=g.campo?.alaDir || "";
  meia.value=g.campo?.meia || "";
  atacante.value=g.campo?.atacante || "";

  golsJogadores.innerHTML="";
  (g.golsJogadores || []).forEach(item=>addLinhaGol(item.jogador,item.gols));

  window.scrollTo({top:0,behavior:"smooth"});
}

function cancelarEdicao(){
  editIndex=null;
  if(document.getElementById("tituloForm"))tituloForm.innerText="Novo jogo";
  if(document.getElementById("btnCancelarEdicao"))btnCancelarEdicao.style.display="none";
  limparFormulario();
}

function limparFormulario(){
  golsA.value="";
  golsB.value="";
  golsJogadores.innerHTML="";
  if(timeB.options.length)timeB.selectedIndex=0;
  if(craque.options.length)craque.selectedIndex=0;
  localJogo.value="Casa";
  gol.value="";
  zagueiro.value="";
  volante.value="";
  alaEsq.value="";
  alaDir.value="";
  meia.value="";
  atacante.value="";
}

function salvarFalcao(){
  let i=jogoSel.value;
  if(i===""){
    alert("Selecione um jogo.");
    return;
  }

  dados[categoria].jogos[i].tempoFalcao=tempoFalcao.value;
  dados[categoria].jogos[i].gF=Number(gF.value);
  dados[categoria].jogos[i].gO=Number(gO.value);

  salvar();
  render();
  alert("Desempenho salvo!");
}

function excluirJogo(i){
  if(leitura)return;
  if(confirm("Excluir este jogo?")){
    dados[categoria].jogos.splice(i,1);
    salvar();
    render();
  }
}

function classeResultado(g){
  if(g.golsA>g.golsB)return "win";
  if(g.golsA<g.golsB)return "loss";
  return "draw";
}

function textoGolsJogadores(g){
  if(!g.golsJogadores || g.golsJogadores.length===0)return "-";
  return g.golsJogadores.map(item=>`${item.jogador}: ${item.gols}`).join("<br>");
}

function render(){
  let d=dados[categoria];

  if(!leitura){
    listaTimes.innerHTML=d.times.map(t=>`<p>${t}</p>`).join("");
    listaJogadores.innerHTML=d.jogadores.map(j=>`<p>${j}</p>`).join("");

    timeB.innerHTML='<option value="">Selecione</option>'+
    d.times.map(t=>`<option value="${t}">${t}</option>`).join("");

    craque.innerHTML=opcoesJogadores();

    gol.innerHTML=opcoesJogadores();
    zagueiro.innerHTML=opcoesJogadores();
    volante.innerHTML=opcoesJogadores();
    alaEsq.innerHTML=opcoesJogadores();
    alaDir.innerHTML=opcoesJogadores();
    meia.innerHTML=opcoesJogadores();
    atacante.innerHTML=opcoesJogadores();

    gF.innerHTML=opcoesGols();
    gO.innerHTML=opcoesGols();

    document.querySelectorAll(".golJogador").forEach(sel=>{
      let valor=sel.value;
      sel.innerHTML=opcoesJogadores(valor);
      sel.value=valor;
    });
  }

  jogoSel.innerHTML='<option value="">Selecione</option>'+
  d.jogos.map((g,i)=>`<option value="${i}">Furacão CL ${g.golsA} x ${g.golsB} ${g.timeB}</option>`).join("");

  games.innerHTML=d.jogos.map((g,i)=>`
    <div class="game ${classeResultado(g)}">
      <b>Furacão CL ${g.golsA} x ${g.golsB} ${g.timeB}</b><br>
      Local: ${g.local || "Casa"}<br>
      Craque: ${g.craque || "-"}<br><br>

      <b>Escalação Furacão CL</b><br>
      GOL: ${g.campo?.gol || "-"}<br>
      ZAGUEIRO: ${g.campo?.zagueiro || "-"}<br>
      VOLANTE: ${g.campo?.volante || "-"}<br>
      ALA ESQ: ${g.campo?.alaEsq || "-"}<br>
      ALA DIR: ${g.campo?.alaDir || "-"}<br>
      MEIA: ${g.campo?.meia || "-"}<br>
      ATACANTE: ${g.campo?.atacante || "-"}<br><br>

      <b>Gols por jogador</b><br>
      ${textoGolsJogadores(g)}<br>

      ${leitura ? "" : `
        <button class="small" onclick="editarJogo(${i})">Editar jogo</button>
        <button class="small" onclick="excluirJogo(${i})">Excluir jogo</button>
      `}
    </div>
  `).join("") || "Nenhum jogo cadastrado.";

  montarTabela();
  montarResumoFalcao();
}

function montarTabela(){
  let d=dados[categoria];

  let tabelaTimes={
    "Furacão CL":{j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0}
  };

  d.times.forEach(t=>{
    tabelaTimes[t]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0};
  });

  d.jogos.forEach(g=>{
    if(!tabelaTimes[g.timeB]){
      tabelaTimes[g.timeB]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0};
    }

    let A=tabelaTimes["Furacão CL"];
    let B=tabelaTimes[g.timeB];

    A.j++;B.j++;
    A.gp+=g.golsA;A.gc+=g.golsB;
    B.gp+=g.golsB;B.gc+=g.golsA;

    if(g.golsA>g.golsB){
      A.pts+=3;A.v++;B.d++;
    }else if(g.golsA<g.golsB){
      B.pts+=3;B.v++;A.d++;
    }else{
      A.pts++;B.pts++;A.e++;B.e++;
    }
  });

  let arr=Object.entries(tabelaTimes).map(([time,t])=>({
    time,...t,sg:t.gp-t.gc
  }));

  arr.sort((a,b)=>b.pts-a.pts || b.sg-a.sg || b.gp-a.gp);

  tabela.innerHTML=`
    <table>
      <tr>
        <th>Time</th><th>J</th><th>Pts</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th>
      </tr>
      ${arr.map(t=>`
        <tr>
          <td>${t.time}</td>
          <td>${t.j}</td>
          <td>${t.pts}</td>
          <td>${t.v}</td>
          <td>${t.e}</td>
          <td>${t.d}</td>
          <td>${t.gp}</td>
          <td>${t.gc}</td>
          <td>${t.sg}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

function montarResumoFalcao(){
  let html="";

  ["sub11","sub12","sub13"].forEach(cat=>{
    let jogos=dados[cat].jogos;
    let inteiro=jogos.filter(j=>j.tempoFalcao==="Jogo inteiro").length;
    let primeiro=jogos.filter(j=>j.tempoFalcao==="1º Tempo").length;
    let segundo=jogos.filter(j=>j.tempoFalcao==="2º Tempo").length;
    let golsF=jogos.reduce((s,j)=>s+(j.gF||0),0);
    let golsO=jogos.reduce((s,j)=>s+(j.gO||0),0);

    html+=`
      <div class="game">
        <h3>${cat.toUpperCase()}</h3>
        Jogo inteiro: ${inteiro}<br>
        1º Tempo: ${primeiro}<br>
        2º Tempo: ${segundo}<br>
        Gols sofridos Falcão: ${golsF}<br>
        Gols sofridos outro goleiro: ${golsO}
      </div>
    `;
  });

  res.innerHTML=html;
}

function gerar(){
  let publico=JSON.parse(JSON.stringify(dados));
  let codigo=btoa(unescape(encodeURIComponent(JSON.stringify(publico))));
  let incluirFalcao=shareFalcao.checked ? "sim" : "nao";
  let url=location.origin+location.pathname+"?share="+codigo+"&falcao="+incluirFalcao;

  link.innerHTML=`
    <b>Link somente leitura:</b><br><br>
    ${url}
    <br><br>
    <button onclick="copiar('${url}')">Copiar link</button>

  `;
}

function copiar(url){
  navigator.clipboard.writeText(url);
  alert("Link copiado!");
}

carregar();
render();
</script>

</body>
</html>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvBBW0BKOk4UGEXec6Bf5qRhjbpANjqr4",
  authDomain: "copa-furacao.firebaseapp.com",
  projectId: "copa-furacao",
  storageBucket: "copa-furacao.firebasestorage.app",
  messagingSenderId: "744874213930",
  appId: "1:744874213930:web:6ae7a0e7731a86bc247953"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let categoria="sub11";
let editIndex=null;
let usuario=null;
let perfil="viewer";

let dados={
  sub11:{times:[],jogadores:[],jogos:[]},
  sub12:{times:[],jogadores:[],jogos:[]},
  sub13:{times:[],jogadores:[],jogos:[]}
};

const dadosRef = doc(db,"copa","dados");
const usersCol = "usuarios";

window.login=async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value,senha.value);
  }catch(e){
    alert("Erro no login: " + e.message);
  }
}

window.criarConta=async function(){
  try{
    const cred = await createUserWithEmailAndPassword(auth,email.value,senha.value);

    const userRef = doc(db,usersCol,cred.user.uid);
    const snap = await getDoc(userRef);

    if(!snap.exists()){
      await setDoc(userRef,{
        email:cred.user.email,
        perfil:"viewer"
      });
    }

    alert("Conta criada. Por padrão, novo usuário entra como visualizador.");
  }catch(e){
    alert("Erro ao criar conta: " + e.message);
  }
}

window.logout=async function(){
  await signOut(auth);
}

onAuthStateChanged(auth, async (user)=>{
  if(user){
    usuario=user;

    const userRef = doc(db,usersCol,user.uid);
    let snap = await getDoc(userRef);

    if(!snap.exists()){
      await setDoc(userRef,{
        email:user.email,
        perfil:"viewer"
      });
      perfil="viewer";
    }else{
      perfil=snap.data().perfil || "viewer";
    }

    loginTela.style.display="none";
    appTela.style.display="block";
    status.innerHTML=`Logado: ${user.email} | Perfil: ${perfil}`;

    aplicarPermissoes();

    onSnapshot(dadosRef, async (snap)=>{
      if(snap.exists()){
        dados=snap.data();
      }else{
        await setDoc(dadosRef,dados);
      }
      render();
    });

  }else{
    usuario=null;
    loginTela.style.display="block";
    appTela.style.display="none";
    status.innerHTML="Faça login para acessar";
  }
});

function podeEditar(){
  return perfil==="admin";
}

function podeVerFalcao(){
  return perfil==="admin" || perfil==="falcao";
}

function aplicarPermissoes(){
  document.querySelectorAll(".adminOnly").forEach(el=>{
    el.style.display=podeEditar() ? "block" : "none";
  });

  btnCad.style.display=podeEditar() ? "block" : "none";
  btnFalcao.style.display=podeVerFalcao() ? "block" : "none";
}

async function salvarNuvem(){
  if(!podeEditar()){
    alert("Você não tem permissão para editar.");
    return;
  }
  await setDoc(dadosRef,dados);
}

window.trocarCategoria=function(c,el){
  categoria=c;
  editIndex=null;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  cancelarEdicao();
  render();
}

window.mostrar=function(id,el){
  jogos.style.display="none";
  cadastros.style.display="none";
  tabelaTela.style.display="none";
  falcao.style.display="none";

  document.getElementById(id).style.display="block";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  render();
}

window.addTime=async function(){
  if(!podeEditar())return alert("Sem permissão.");
  let n=novoTime.value.trim();
  if(!n)return;
  dados[categoria].times.push(n);
  novoTime.value="";
  await salvarNuvem();
}

window.addJogador=async function(){
  if(!podeEditar())return alert("Sem permissão.");
  let n=novoJogador.value.trim();
  if(!n)return;
  dados[categoria].jogadores.push(n);
  novoJogador.value="";
  await salvarNuvem();
}

function opcoesJogadores(valor=""){
  return '<option value="">Selecione</option>'+
  dados[categoria].jogadores.map(j=>`<option value="${j}" ${j===valor?"selected":""}>${j}</option>`).join("");
}

function opcoesGols(valor=0){
  let h="";
  for(let i=0;i<=20;i++) h+=`<option value="${i}" ${i==valor?"selected":""}>${i}</option>`;
  return h;
}

window.addLinhaGol=function(jogador="", qtd=1){
  let div=document.createElement("div");
  div.className="goal-row";
  div.innerHTML=`
    <select class="golJogador">${opcoesJogadores(jogador)}</select>
    <input class="qtdGolJogador" type="number" min="0" value="${qtd}">
    <button type="button" onclick="this.parentElement.remove()">X</button>
  `;
  golsJogadores.appendChild(div);
}

function obterGolsJogadores(){
  let lista=[];
  document.querySelectorAll(".goal-row").forEach(row=>{
    let jogador=row.querySelector(".golJogador").value;
    let gols=Number(row.querySelector(".qtdGolJogador").value||0);
    if(jogador && gols>0) lista.push({jogador,gols});
  });
  return lista;
}

window.salvarJogo=async function(){
  if(!podeEditar())return alert("Sem permissão.");

  if(!timeB.value){
    alert("Selecione o adversário.");
    return;
  }

  let jogo={
    timeB:timeB.value,
    golsA:Number(golsA.value||0),
    golsB:Number(golsB.value||0),
    local:localJogo.value,
    craque:craque.value,
    campo:{
      gol:gol.value,
      zagueiro:zagueiro.value,
      volante:volante.value,
      alaEsq:alaEsq.value,
      alaDir:alaDir.value,
      meia:meia.value,
      atacante:atacante.value
    },
    golsJogadores:obterGolsJogadores(),
    tempoFalcao:"Jogo inteiro",
    gF:0,
    gO:0
  };

  if(editIndex!==null){
    let antigo=dados[categoria].jogos[editIndex];
    jogo.tempoFalcao=antigo.tempoFalcao || "Jogo inteiro";
    jogo.gF=antigo.gF || 0;
    jogo.gO=antigo.gO || 0;
    dados[categoria].jogos[editIndex]=jogo;
  }else{
    dados[categoria].jogos.push(jogo);
  }

  limparFormulario();
  await salvarNuvem();
}

window.editarJogo=function(i){
  if(!podeEditar())return;
  let g=dados[categoria].jogos[i];
  editIndex=i;

  tituloForm.innerText="Editar jogo";
  btnCancelarEdicao.style.display="block";

  timeB.value=g.timeB;
  golsA.value=g.golsA;
  golsB.value=g.golsB;
  localJogo.value=g.local || "Casa";
  craque.value=g.craque || "";

  gol.value=g.campo?.gol || "";
  zagueiro.value=g.campo?.zagueiro || "";
  volante.value=g.campo?.volante || "";
  alaEsq.value=g.campo?.alaEsq || "";
  alaDir.value=g.campo?.alaDir || "";
  meia.value=g.campo?.meia || "";
  atacante.value=g.campo?.atacante || "";

  golsJogadores.innerHTML="";
  (g.golsJogadores || []).forEach(item=>addLinhaGol(item.jogador,item.gols));

  window.scrollTo({top:0,behavior:"smooth"});
}

window.cancelarEdicao=function(){
  editIndex=null;
  if(document.getElementById("tituloForm"))tituloForm.innerText="Novo jogo";
  if(document.getElementById("btnCancelarEdicao"))btnCancelarEdicao.style.display="none";
  limparFormulario();
}

function limparFormulario(){
  golsA.value="";
  golsB.value="";
  golsJogadores.innerHTML="";
  if(timeB.options.length)timeB.selectedIndex=0;
  if(craque.options.length)craque.selectedIndex=0;
  localJogo.value="Casa";
  gol.value="";
  zagueiro.value="";
  volante.value="";
  alaEsq.value="";
  alaDir.value="";
  meia.value="";
  atacante.value="";
}

window.salvarFalcao=async function(){
  if(!podeEditar())return alert("Sem permissão.");

  let i=jogoSel.value;
  if(i===""){
    alert("Selecione um jogo.");
    return;
  }

  dados[categoria].jogos[i].tempoFalcao=tempoFalcao.value;
  dados[categoria].jogos[i].gF=Number(gF.value);
  dados[categoria].jogos[i].gO=Number(gO.value);

  await salvarNuvem();
  alert("Desempenho salvo!");
}

window.excluirJogo=async function(i){
  if(!podeEditar())return;
  if(confirm("Excluir este jogo?")){
    dados[categoria].jogos.splice(i,1);
    await salvarNuvem();
  }
}

function classeResultado(g){
  if(g.golsA>g.golsB)return "win";
  if(g.golsA<g.golsB)return "loss";
  return "draw";
}

function textoGolsJogadores(g){
  if(!g.golsJogadores || g.golsJogadores.length===0)return "-";
  return g.golsJogadores.map(item=>`${item.jogador}: ${item.gols}`).join("<br>");
}

function render(){
  let d=dados[categoria];

  listaTimes.innerHTML=d.times.map(t=>`<p>${t}</p>`).join("");
  listaJogadores.innerHTML=d.jogadores.map(j=>`<p>${j}</p>`).join("");

  if(podeEditar()){
    timeB.innerHTML='<option value="">Selecione</option>'+
    d.times.map(t=>`<option value="${t}">${t}</option>`).join("");

    craque.innerHTML=opcoesJogadores();

    gol.innerHTML=opcoesJogadores();
    zagueiro.innerHTML=opcoesJogadores();
    volante.innerHTML=opcoesJogadores();
    alaEsq.innerHTML=opcoesJogadores();
    alaDir.innerHTML=opcoesJogadores();
    meia.innerHTML=opcoesJogadores();
    atacante.innerHTML=opcoesJogadores();

    gF.innerHTML=opcoesGols();
    gO.innerHTML=opcoesGols();
  }

  jogoSel.innerHTML='<option value="">Selecione</option>'+
  d.jogos.map((g,i)=>`<option value="${i}">Furacão CL ${g.golsA} x ${g.golsB} ${g.timeB}</option>`).join("");

  games.innerHTML=d.jogos.map((g,i)=>`
    <div class="game ${classeResultado(g)}">
      <b>Furacão CL ${g.golsA} x ${g.golsB} ${g.timeB}</b><br>
      Local: ${g.local || "Casa"}<br>
      Craque: ${g.craque || "-"}<br><br>

      <b>Escalação Furacão CL</b><br>
      GOL: ${g.campo?.gol || "-"}<br>
      ZAGUEIRO: ${g.campo?.zagueiro || "-"}<br>
      VOLANTE: ${g.campo?.volante || "-"}<br>
      ALA ESQ: ${g.campo?.alaEsq || "-"}<br>
      ALA DIR: ${g.campo?.alaDir || "-"}<br>
      MEIA: ${g.campo?.meia || "-"}<br>
      ATACANTE: ${g.campo?.atacante || "-"}<br><br>

      <b>Gols por jogador</b><br>
      ${textoGolsJogadores(g)}<br>

      ${podeEditar() ? `
        <button class="small" onclick="editarJogo(${i})">Editar jogo</button>
        <button class="small" onclick="excluirJogo(${i})">Excluir jogo</button>
      ` : ""}
    </div>
  `).join("") || "Nenhum jogo cadastrado.";

  montarTabela();
  montarResumoFalcao();
}

function montarTabela(){
  let d=dados[categoria];

  let tabelaTimes={
    "Furacão CL":{j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0}
  };

  d.times.forEach(t=>{
    tabelaTimes[t]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0};
  });

  d.jogos.forEach(g=>{
    if(!tabelaTimes[g.timeB]){
      tabelaTimes[g.timeB]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0};
    }

    let A=tabelaTimes["Furacão CL"];
    let B=tabelaTimes[g.timeB];

    A.j++; B.j++;
    A.gp+=g.golsA; A.gc+=g.golsB;
    B.gp+=g.golsB; B.gc+=g.golsA;

    if(g.golsA>g.golsB){A.pts+=3;A.v++;B.d++;}
    else if(g.golsA<g.golsB){B.pts+=3;B.v++;A.d++;}
    else{A.pts++;B.pts++;A.e++;B.e++;}
  });

  let arr=Object.entries(tabelaTimes).map(([time,t])=>({
    time,...t,sg:t.gp-t.gc
  }));

  arr.sort((a,b)=>b.pts-a.pts || b.sg-a.sg || b.gp-a.gp);

  tabela.innerHTML=`
    <table>
      <tr><th>Time</th><th>J</th><th>Pts</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr>
      ${arr.map(t=>`
        <tr>
          <td>${t.time}</td><td>${t.j}</td><td>${t.pts}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td>${t.gp}</td><td>${t.gc}</td><td>${t.sg}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

function montarResumoFalcao(){
  let html="";

  ["sub11","sub12","sub13"].forEach(cat=>{
    let jogos=dados[cat].jogos;
    let inteiro=jogos.filter(j=>j.tempoFalcao==="Jogo inteiro").length;
    let primeiro=jogos.filter(j=>j.tempoFalcao==="1º Tempo").length;
    let segundo=jogos.filter(j=>j.tempoFalcao==="2º Tempo").length;
    let golsF=jogos.reduce((s,j)=>s+(j.gF||0),0);
    let golsO=jogos.reduce((s,j)=>s+(j.gO||0),0);

    html+=`
      <div class="game">
        <h3>${cat.toUpperCase()}</h3>
        Jogo inteiro: ${inteiro}<br>
        1º Tempo: ${primeiro}<br>
        2º Tempo: ${segundo}<br>
        Gols sofridos Falcão: ${golsF}<br>
        Gols sofridos outro goleiro: ${golsO}
      </div>
    `;
  });

  res.innerHTML=html;
}
</script>
