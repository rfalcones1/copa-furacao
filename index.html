<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Furacão PRO</title>

<style>
body{margin:0;font-family:Arial;background:#080808;color:white}
header{background:linear-gradient(90deg,#c8102e,#790000);padding:16px;text-align:center;font-size:22px;font-weight:bold}
.tabs,.nav{display:flex;background:#111}
.tab,.nav button{flex:1;text-align:center;padding:12px;font-weight:bold;border:none;color:white;background:#222}
.tab.active,.nav button.active{background:#c8102e}
.container{padding:14px}
.section{background:#151515;margin-bottom:16px;padding:14px;border-radius:12px}
label{display:block;margin-top:10px;font-weight:bold;color:#ddd}
input,select,textarea{width:100%;padding:11px;margin-top:5px;border-radius:8px;border:none}
button{width:100%;padding:13px;margin-top:12px;background:#c8102e;color:white;border:none;border-radius:9px;font-weight:bold}
.small-btn{background:#333}
.game{margin-top:10px;padding:12px;border-radius:9px}
.win{background:#167a37}.draw{background:#a98208}.loss{background:#84241c}
.badge{background:#c8102e;padding:5px 8px;border-radius:6px;margin:3px;display:inline-block}
.fixed-team{background:#fff;color:#000;font-weight:bold}
.field{background:#126b35;border:3px solid white;border-radius:18px;padding:14px;margin-top:10px}
.pos{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.6);border-radius:10px;padding:8px;margin:8px 0}
.pos-title{text-align:center;font-weight:bold}
</style>
</head>

<body>

<header>Copa Furacão PRO</header>

<div class="tabs">
  <div class="tab active" onclick="trocarCategoria('sub11',this)">Sub11</div>
  <div class="tab" onclick="trocarCategoria('sub12',this)">Sub12</div>
  <div class="tab" onclick="trocarCategoria('sub13',this)">Sub13</div>
</div>

<div class="container">

<div class="nav">
  <button class="active" onclick="mostrarTela('jogos',this)">Jogos</button>
  <button onclick="mostrarTela('cadastros',this)">Cadastros</button>
  <button onclick="mostrarTela('desempenhoTela',this)">Falcão</button>
</div>

<div id="cadastros" style="display:none">
<h3>Adversários</h3>
<input id="novoTime"><button onclick="addTime()">Adicionar</button>
<div id="listaTimes"></div>

<h3>Jogadores</h3>
<input id="novoJogador"><button onclick="addJogador()">Adicionar</button>
<div id="listaJogadores"></div>
</div>

<div id="jogos">

<h3>Novo Jogo</h3>

<label>Time A</label>
<input class="fixed-team" value="Furacão CL" readonly>

<label>Adversário</label>
<select id="timeB"></select>

<label>Gols Furacão</label>
<input id="golsA" type="number">

<label>Gols adversário</label>
<input id="golsB" type="number">

<label>Craque</label>
<select id="craque"></select>

<div class="field">
<div class="pos"><div class="pos-title">GOL</div><select id="gol"></select></div>
<div class="pos"><div class="pos-title">FIXO</div><select id="fixo"></select></div>
<div class="pos"><div class="pos-title">ALA ESQ</div><select id="alaEsq"></select></div>
<div class="pos"><div class="pos-title">ALA DIR</div><select id="alaDir"></select></div>
<div class="pos"><div class="pos-title">MEIA</div><select id="meia"></select></div>
<div class="pos"><div class="pos-title">PIVÔ</div><select id="pivo"></select></div>
</div>

<label>
<input type="checkbox" id="completo"> Falcão jogo completo
</label>

<label>Gols sofridos Falcão</label>
<input id="golsFalcao" type="number">

<label>Gols sofridos outro goleiro</label>
<input id="golsOutroGoleiro" type="number">

<button onclick="addGame()">Salvar</button>

<div id="games"></div>

</div>

<div id="desempenhoTela" style="display:none">
<div id="desempenho"></div>
</div>

</div>

<script>
let categoria="sub11";

let dados=JSON.parse(localStorage.getItem("app"))||{
sub11:{times:[],jogadores:[],jogos:[]},
sub12:{times:[],jogadores:[],jogos:[]},
sub13:{times:[],jogadores:[],jogos:[]}
};

function salvar(){localStorage.setItem("app",JSON.stringify(dados));}

function trocarCategoria(cat,el){
categoria=cat;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
render();
}

function mostrarTela(id,el){
jogos.style.display="none";
cadastros.style.display="none";
desempenhoTela.style.display="none";
document.getElementById(id).style.display="block";
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

function addTime(){let n=novoTime.value;if(!n)return;dados[categoria].times.push(n);novoTime.value="";salvar();render();}
function addJogador(){let n=novoJogador.value;if(!n)return;dados[categoria].jogadores.push(n);novoJogador.value="";salvar();render();}

function opcoes(){
return dados[categoria].jogadores.map(j=>`<option>${j}</option>`).join("");
}

function addGame(){
let j={
timeB:timeB.value,
golsA:+golsA.value,
golsB:+golsB.value,
craque:craque.value,
campo:{gol:gol.value,fixo:fixo.value,alaEsq:alaEsq.value,alaDir:alaDir.value,meia:meia.value,pivo:pivo.value},
completo:completo.checked,
golsFalcao:+golsFalcao.value||0,
golsOutro:+golsOutroGoleiro.value||0
};
dados[categoria].jogos.push(j);
salvar();render();
}

function render(){
let d=dados[categoria];

listaTimes.innerHTML=d.times.map(t=>`<span class="badge">${t}</span>`).join("");
listaJogadores.innerHTML=d.jogadores.map(j=>`<span class="badge">${j}</span>`).join("");

timeB.innerHTML=d.times.map(t=>`<option>${t}</option>`).join("");
craque.innerHTML=opcoes();

gol.innerHTML=opcoes();
fixo.innerHTML=opcoes();
alaEsq.innerHTML=opcoes();
alaDir.innerHTML=opcoes();
meia.innerHTML=opcoes();
pivo.innerHTML=opcoes();

let html="";
d.jogos.forEach((g,i)=>{
html+=`<div class="game">
${g.golsA} x ${g.golsB} ${g.timeB}<br>
Falcão: ${g.golsFalcao} | Outro: ${g.golsOutro}<br>
<button onclick="dados[categoria].jogos.splice(${i},1);salvar();render()">Excluir</button>
</div>`;
});
games.innerHTML=html;

montarDesempenho();
}

function montarDesempenho(){
let jogos=dados[categoria].jogos;

let completos=jogos.filter(j=>j.completo).length;
let golsF=jogos.reduce((s,j)=>s+j.golsFalcao,0);
let golsO=jogos.reduce((s,j)=>s+j.golsOutro,0);

desempenho.innerHTML=`
<h3>Desempenho Falcão</h3>
<p>Jogos completos: ${completos}</p>
<p>Gols sofridos Falcão: ${golsF}</p>
<p>Gols sofridos outro goleiro: ${golsO}</p>
`;
}

render();
</script>

</body>
</html>
