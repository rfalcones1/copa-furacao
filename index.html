<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Furacão</title>
<style>
body{margin:0;font-family:Arial;background:#080808;color:white}
header{background:#c8102e;padding:16px;text-align:center;font-size:24px;font-weight:bold}
.status{background:#222;padding:10px;text-align:center}
.tabs,.nav{display:flex;background:#111;overflow-x:auto}
.tab,.nav button{min-width:110px;flex:1;padding:12px;font-weight:bold;border:none;color:white;background:#222;font-size:14px}
.tab.active,.nav button.active{background:#c8102e}
.container{padding:14px}
.section{background:#151515;margin-bottom:16px;padding:14px;border-radius:12px}
label{display:block;margin-top:10px;font-weight:bold;color:#ddd;text-transform:uppercase;font-size:13px}
input,select{width:100%;padding:12px;margin-top:5px;border-radius:10px;border:none;font-size:16px;text-align:center;box-sizing:border-box}
button{width:100%;padding:14px;margin-top:14px;background:#c8102e;color:white;border:none;border-radius:10px;font-weight:bold}
.small{background:#333}
.game,.ranking{margin-top:10px;padding:12px;border-radius:9px;background:#222}
.win{background:#167a37}.draw{background:#a98208}.loss{background:#84241c}
table{width:100%;border-collapse:collapse;text-align:center;font-size:13px}
th,td{padding:7px;border-bottom:1px solid #333}
.goal-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.goal-row select{flex:2}.goal-row input{flex:1}.goal-row button{flex:1;margin-top:5px;padding:10px}
</style>
</head>

<body>

<header>Copa Furacão</header>
<div id="status" class="status">Modo público: somente visualização</div>

<div id="loginTela" class="container" style="display:none">
  <div class="section">
    <h3>Login do administrador</h3>
    <label>E-mail</label>
    <input id="email" type="email">
    <label>Senha</label>
    <input id="senha" type="password">
    <button onclick="login()">Entrar</button>
    <button class="small" onclick="mostrar('jogos',btnJogos)">Voltar</button>
  </div>
</div>

<div id="appTela">

<div class="tabs">
  <div class="tab active" onclick="trocarCategoria('sub11',this)">Sub11</div>
  <div class="tab" onclick="trocarCategoria('sub12',this)">Sub12</div>
  <div class="tab" onclick="trocarCategoria('sub13',this)">Sub13</div>
</div>

<div class="container">

<div class="nav">
  <button id="btnJogos" class="active" onclick="mostrar('jogos',this)">Jogos</button>
  <button id="btnCad" style="display:none" onclick="mostrar('cadastros',this)">Cadastros</button>
  <button onclick="mostrar('tabelaTela',this)">Tabela</button>
  <button onclick="mostrar('artilhariaTela',this)">Artilharia</button>
  <button id="btnFalcao" style="display:none" onclick="mostrar('falcao',this)">Falcão</button>
  <button id="btnLogin" onclick="abrirLogin()">Login</button>
  <button id="btnSair" style="display:none" onclick="logout()">Sair</button>
</div>

<div id="cadastros" style="display:none">
  <div class="section">
    <h3>Cadastro de times</h3>
    <input id="novoTime" placeholder="Nome do time">
    <button onclick="addTime()">Adicionar time</button>
    <div id="listaTimes"></div>
  </div>

  <div class="section">
    <h3>Cadastro de jogadores</h3>
    <input id="novoJogador" placeholder="Nome do jogador">
    <button onclick="addJogador()">Adicionar jogador</button>
    <div id="listaJogadores"></div>
  </div>
</div>

<div id="jogos">
  <div class="section adminOnly">
    <h3>Novo jogo</h3>

    <label>Time A</label>
    <select id="timeA"></select>

    <label>Gols Time A</label>
    <input id="golsA" type="number">

    <label>Time B</label>
    <select id="timeB"></select>

    <label>Gols Time B</label>
    <input id="golsB" type="number">

    <label>Jogo em casa ou fora</label>
    <select id="localJogo">
      <option value="Casa">Casa</option>
      <option value="Fora">Fora</option>
      <option value="Neutro">Neutro</option>
    </select>

    <label>Craque da partida</label>
    <select id="craque"></select>

    <h3>Gols por jogador</h3>
    <div id="golsJogadores"></div>
    <button class="small" onclick="addLinhaGol()">Adicionar jogador que fez gol</button>

    <button onclick="salvarJogo()">Salvar jogo</button>
  </div>

  <div class="section">
    <h3>Jogos cadastrados</h3>
    <div id="games"></div>
  </div>
</div>

<div id="tabelaTela" style="display:none">
  <div class="section">
    <h3>Tabela de classificação</h3>
    <div id="tabela"></div>
  </div>
</div>

<div id="artilhariaTela" style="display:none">
  <div class="section">
    <h3>Artilharia por categoria</h3>
    <div id="artilharia"></div>
  </div>
</div>

<div id="falcao" style="display:none">
  <div class="section adminOnly">
    <h3>Registro Falcão</h3>

    <label>Selecionar jogo do Furacão CL</label>
    <select id="jogoSel"></select>

    <label>Participação do Falcão</label>
    <select id="tempoFalcao">
      <option value="Jogo inteiro">Jogo inteiro</option>
      <option value="1º Tempo">1º Tempo</option>
      <option value="2º Tempo">2º Tempo</option>
    </select>

    <label>Gols sofridos Falcão</label>
    <select id="gF"></select>

    <label>Gols sofridos outro goleiro</label>
    <select id="gO"></select>

    <button onclick="salvarFalcao()">Salvar desempenho</button>
  </div>

  <div class="section">
    <h3>Ranking goleiro</h3>
    <div id="res"></div>
  </div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvBBW0BKOk4UGEXec6Bf5qRhjbpANjqr4",
  authDomain: "copa-furacao.firebaseapp.com",
  projectId: "copa-furacao",
  storageBucket: "copa-furacao.firebasestorage.app",
  messagingSenderId: "744874213930",
  appId: "1:744874213930:web:6ae7a0e7731a86bc247953"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL="ricardo1.falcao@hotmail.com";
const dadosRef=doc(db,"copa","dados");

let categoria="sub11";
let perfil="publico";

let dados={
  sub11:{times:["Furacão CL"],jogadores:[],jogos:[]},
  sub12:{times:["Furacão CL"],jogadores:[],jogos:[]},
  sub13:{times:["Furacão CL"],jogadores:[],jogos:[]}
};

function corrigirEstrutura(){
  ["sub11","sub12","sub13"].forEach(c=>{
    if(!dados[c]) dados[c]={times:["Furacão CL"],jogadores:[],jogos:[]};
    if(!dados[c].times) dados[c].times=["Furacão CL"];
    if(!dados[c].times.includes("Furacão CL")) dados[c].times.unshift("Furacão CL");
    if(!dados[c].jogadores) dados[c].jogadores=[];
    if(!dados[c].jogos) dados[c].jogos=[];
  });
}

function podeEditar(){return perfil==="admin";}

function aplicarPermissoes(){
  const admin=podeEditar();

  document.querySelectorAll(".adminOnly").forEach(el=>{
    el.style.display=admin?"block":"none";
  });

  btnCad.style.display=admin?"block":"none";
  btnFalcao.style.display=admin?"block":"none";
  btnLogin.style.display=perfil==="publico"?"block":"none";
  btnSair.style.display=admin?"block":"none";

  if(!admin && (cadastros.style.display==="block" || falcao.style.display==="block")){
    cadastros.style.display="none";
    falcao.style.display="none";
    jogos.style.display="block";
  }
}

window.abrirLogin=()=>{
  appTela.style.display="none";
  loginTela.style.display="block";
};

window.login=async()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,senha.value);
  }catch(e){
    alert("Erro no login: "+e.message);
  }
};

window.logout=async()=>{
  await signOut(auth);
};

onAuthStateChanged(auth,async(user)=>{
  if(user && user.email.toLowerCase()===ADMIN_EMAIL.toLowerCase()){
    perfil="admin";

    const ref=doc(db,"usuarios",user.uid);
    const snap=await getDoc(ref);
    if(!snap.exists()) await setDoc(ref,{email:user.email,perfil:"admin"});

    status.innerHTML=`Logado: ${user.email} | ADMIN`;
  }else{
    perfil="publico";
    if(user) await signOut(auth);
    status.innerHTML="Modo público: somente visualização";
  }

  loginTela.style.display="none";
  appTela.style.display="block";

  render();
  aplicarPermissoes();
});

onSnapshot(dadosRef,async(snap)=>{
  if(snap.exists()){
    dados=snap.data();
    corrigirEstrutura();
  }else{
    corrigirEstrutura();
    await setDoc(dadosRef,dados);
  }

  render();
  aplicarPermissoes();
});

async function salvarNuvem(){
  if(!podeEditar())return alert("Sem permissão.");
  corrigirEstrutura();
  await setDoc(dadosRef,dados);
}

window.trocarCategoria=(c,el)=>{
  categoria=c;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
  aplicarPermissoes();
};

window.mostrar=(id,el)=>{
  if((id==="cadastros" || id==="falcao") && !podeEditar()){
    alert("Acesso restrito ao administrador.");
    return;
  }

  loginTela.style.display="none";
  appTela.style.display="block";

  jogos.style.display="none";
  cadastros.style.display="none";
  tabelaTela.style.display="none";
  artilhariaTela.style.display="none";
  falcao.style.display="none";

  document.getElementById(id).style.display="block";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  render();
  aplicarPermissoes();
};

window.addTime=async()=>{
  let n=novoTime.value.trim();
  if(!n)return;
  if(!dados[categoria].times.includes(n))dados[categoria].times.push(n);
  novoTime.value="";
  await salvarNuvem();
};

window.addJogador=async()=>{
  let n=novoJogador.value.trim();
  if(!n)return;
  dados[categoria].jogadores.push(n);
  novoJogador.value="";
  await salvarNuvem();
};

function opcoesTimes(valor=""){
  return '<option value="">Selecione</option>'+
  dados[categoria].times.map(t=>`<option value="${t}" ${t===valor?"selected":""}>${t}</option>`).join("");
}

function opcoesJogadores(valor=""){
  return '<option value="">Selecione</option>'+
  dados[categoria].jogadores.map(j=>`<option value="${j}" ${j===valor?"selected":""}>${j}</option>`).join("");
}

function opcoesGols(valor=0){
  let h="";
  for(let i=0;i<=20;i++)h+=`<option value="${i}" ${i==valor?"selected":""}>${i}</option>`;
  return h;
}

window.addLinhaGol=(jogador="",qtd=1)=>{
  let div=document.createElement("div");
  div.className="goal-row";
  div.innerHTML=`<select class="golJogador">${opcoesJogadores(jogador)}</select><input class="qtdGolJogador" type="number" min="0" value="${qtd}"><button type="button" onclick="this.parentElement.remove()">X</button>`;
  golsJogadores.appendChild(div);
};

function obterGolsJogadores(){
  let lista=[];
  document.querySelectorAll(".goal-row").forEach(row=>{
    let jogador=row.querySelector(".golJogador").value;
    let gols=Number(row.querySelector(".qtdGolJogador").value||0);
    if(jogador&&gols>0)lista.push({jogador,gols});
  });
  return lista;
}

window.salvarJogo=async()=>{
  if(!podeEditar())return alert("Sem permissão.");
  if(!timeA.value || !timeB.value)return alert("Selecione os dois times.");
  if(timeA.value===timeB.value)return alert("Os times precisam ser diferentes.");

  dados[categoria].jogos.push({
    timeA:timeA.value,
    timeB:timeB.value,
    golsA:Number(golsA.value||0),
    golsB:Number(golsB.value||0),
    local:localJogo.value,
    craque:craque.value,
    golsJogadores:obterGolsJogadores(),
    tempoFalcao:"",
    gF:0,
    gO:0
  });

  golsA.value="";
  golsB.value="";
  golsJogadores.innerHTML="";
  await salvarNuvem();
};

window.excluirJogo=async(i)=>{
  if(!podeEditar())return;
  if(confirm("Excluir este jogo?")){
    dados[categoria].jogos.splice(i,1);
    await salvarNuvem();
  }
};

window.salvarFalcao=async()=>{
  if(!podeEditar())return;
  let i=jogoSel.value;
  if(i==="")return alert("Selecione um jogo.");

  dados[categoria].jogos[i].tempoFalcao=tempoFalcao.value;
  dados[categoria].jogos[i].gF=Number(gF.value);
  dados[categoria].jogos[i].gO=Number(gO.value);

  await salvarNuvem();
  alert("Desempenho salvo!");
};

function classeResultado(g){
  if(!["Furacão CL"].includes(g.timeA) && !["Furacão CL"].includes(g.timeB)) return "";
  let furacaoGols=g.timeA==="Furacão CL"?g.golsA:g.golsB;
  let outroGols=g.timeA==="Furacão CL"?g.golsB:g.golsA;
  if(furacaoGols>outroGols)return"win";
  if(furacaoGols<outroGols)return"loss";
  return"draw";
}

function render(){
  corrigirEstrutura();
  let d=dados[categoria];

  listaTimes.innerHTML=d.times.map(t=>`<p>${t}</p>`).join("");
  listaJogadores.innerHTML=d.jogadores.map(j=>`<p>${j}</p>`).join("");

  if(podeEditar()){
    timeA.innerHTML=opcoesTimes();
    timeB.innerHTML=opcoesTimes();
    craque.innerHTML=opcoesJogadores();
    gF.innerHTML=opcoesGols();
    gO.innerHTML=opcoesGols();
  }

  let jogosFuracao=d.jogos
    .map((g,i)=>({g,i}))
    .filter(x=>x.g.timeA==="Furacão CL" || x.g.timeB==="Furacão CL");

  jogoSel.innerHTML='<option value="">Selecione</option>'+
    jogosFuracao.map(x=>`<option value="${x.i}">${x.g.timeA} ${x.g.golsA} x ${x.g.golsB} ${x.g.timeB}</option>`).join("");

  games.innerHTML=d.jogos.map((g,i)=>`
    <div class="game ${classeResultado(g)}">
      <b>${g.timeA} ${g.golsA} x ${g.golsB} ${g.timeB}</b><br>
      Local: ${g.local||"-"}<br>
      Craque: ${g.craque||"-"}<br>
      <b>Gols por jogador</b><br>
      ${(g.golsJogadores||[]).map(j=>`${j.jogador}: ${j.gols}`).join("<br>") || "-"}
      ${podeEditar()?`<button class="small" onclick="excluirJogo(${i})">Excluir jogo</button>`:""}
    </div>
  `).join("")||"Nenhum jogo cadastrado.";

  montarTabela();
  montarArtilharia();
  montarFalcao();
}

function montarTabela(){
  let d=dados[categoria];
  let tabelaTimes={};

  d.times.forEach(t=>tabelaTimes[t]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0});

  d.jogos.forEach(g=>{
    if(!tabelaTimes[g.timeA])tabelaTimes[g.timeA]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0};
    if(!tabelaTimes[g.timeB])tabelaTimes[g.timeB]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0};

    let A=tabelaTimes[g.timeA],B=tabelaTimes[g.timeB];

    A.j++;B.j++;
    A.gp+=g.golsA;A.gc+=g.golsB;
    B.gp+=g.golsB;B.gc+=g.golsA;

    if(g.golsA>g.golsB){A.pts+=3;A.v++;B.d++;}
    else if(g.golsA<g.golsB){B.pts+=3;B.v++;A.d++;}
    else{A.pts++;B.pts++;A.e++;B.e++;}
  });

  let arr=Object.entries(tabelaTimes).map(([time,t])=>({time,...t,sg:t.gp-t.gc}));
  arr.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);

  tabela.innerHTML=`<table><tr><th>Time</th><th>J</th><th>Pts</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr>${arr.map(t=>`<tr><td>${t.time}</td><td>${t.j}</td><td>${t.pts}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td>${t.gp}</td><td>${t.gc}</td><td>${t.sg}</td></tr>`).join("")}</table>`;
}

function montarArtilharia(){
  let gols={};

  dados[categoria].jogos.forEach(j=>{
    (j.golsJogadores||[]).forEach(item=>{
      gols[item.jogador]=(gols[item.jogador]||0)+Number(item.gols||0);
    });
  });

  let ranking=Object.entries(gols).sort((a,b)=>b[1]-a[1]);

  artilharia.innerHTML=ranking.length
    ? ranking.map((r,i)=>`<div class="ranking"><b>${i+1}º ${r[0]}</b><br>${r[1]} gol(s)</div>`).join("")
    : "Nenhum gol cadastrado.";
}

function montarFalcao(){
  let html="";

  ["sub11","sub12","sub13"].forEach(cat=>{
    let jogos=dados[cat].jogos.filter(j=>j.timeA==="Furacão CL" || j.timeB==="Furacão CL");

    let golsF=jogos.reduce((s,j)=>s+Number(j.gF||0),0);
    let golsO=jogos.reduce((s,j)=>s+Number(j.gO||0),0);

    let goleiros=[
      {nome:"Falcão", gols:golsF},
      {nome:"Outro goleiro", gols:golsO}
    ].sort((a,b)=>a.gols-b.gols);

    html+=`<div class="ranking">
      <h3>${cat.toUpperCase()}</h3>
      Jogos Furacão CL: ${jogos.length}<br>
      Gols sofridos Falcão: ${golsF}<br>
      Gols sofridos outro goleiro: ${golsO}<br><br>
      <b>Ranking interno</b><br>
      1º ${goleiros[0].nome}: ${goleiros[0].gols}<br>
      2º ${goleiros[1].nome}: ${goleiros[1].gols}
    </div>`;
  });

  res.innerHTML=html;
}
</script>

</body>
</html>
