<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Furacão PRO</title>
<style>
body{margin:0;font-family:Arial;background:#080808;color:white}
header{background:#c8102e;padding:16px;text-align:center;font-size:22px;font-weight:bold}
.tabs,.nav{display:flex;background:#111}
.tab,.nav button{flex:1;padding:12px;font-weight:bold;border:none;color:white;background:#222}
.tab.active,.nav button.active{background:#c8102e}
.container{padding:14px}
.section{background:#151515;margin-bottom:16px;padding:14px;border-radius:12px}
label{display:block;margin-top:10px;font-weight:bold;color:#ddd}
input,select,textarea{width:100%;padding:11px;margin-top:5px;border-radius:8px;border:none;font-size:16px}
button{width:100%;padding:13px;margin-top:12px;background:#c8102e;color:white;border:none;border-radius:9px;font-weight:bold}
.badge{background:#c8102e;padding:5px 8px;border-radius:6px;margin:3px;display:inline-block}
.field{background:#126b35;border:3px solid white;border-radius:18px;padding:14px;margin-top:10px}
.pos{background:rgba(255,255,255,.14);border:1px solid white;border-radius:10px;padding:8px;margin:8px 0}
.pos-title{text-align:center;font-weight:bold}
.game{background:#222;margin-top:10px;padding:12px;border-radius:9px}
</style>
</head>

<body>

<header>Copa Furacão PRO</header>

<div class="tabs">
  <div class="tab active" onclick="trocarCategoria('sub11',this)">Sub11</div>
  <div class="tab" onclick="trocarCategoria('sub12',this)">Sub12</div>
  <div class="tab" onclick="trocarCategoria('sub13',this)">Sub13</div>
</div>

<div class="container">

<div class="nav">
  <button class="active" onclick="mostrarTela('jogos',this)">Jogos</button>
  <button onclick="mostrarTela('cadastros',this)">Cadastros</button>
  <button onclick="mostrarTela('falcaoTela',this)">Falcão</button>
</div>

<div id="cadastros" style="display:none">
  <div class="section">
    <h3>Adversários</h3>
    <input id="novoTime" placeholder="Nome do adversário">
    <button onclick="addTime()">Adicionar adversário</button>
    <div id="listaTimes"></div>
  </div>

  <div class="section">
    <h3>Jogadores</h3>
    <input id="novoJogador" placeholder="Nome do jogador">
    <button onclick="addJogador()">Adicionar jogador</button>
    <div id="listaJogadores"></div>
  </div>
</div>

<div id="jogos">
  <div class="section">
    <h3>Novo jogo</h3>

    <label>Time A</label>
    <input value="Furacão CL" readonly>

    <label>Adversário</label>
    <select id="timeB"></select>

    <label>Gols Furacão CL</label>
    <input id="golsA" type="number">

    <label>Gols adversário</label>
    <input id="golsB" type="number">

    <label>Craque da partida</label>
    <select id="craque"></select>

    <h3>Campo society</h3>
    <div class="field">
      <div class="pos"><div class="pos-title">GOL</div><select id="gol"></select></div>
      <div class="pos"><div class="pos-title">FIXO</div><select id="fixo"></select></div>
      <div class="pos"><div class="pos-title">ALA ESQ</div><select id="alaEsq"></select></div>
      <div class="pos"><div class="pos-title">ALA DIR</div><select id="alaDir"></select></div>
      <div class="pos"><div class="pos-title">MEIA</div><select id="meia"></select></div>
      <div class="pos"><div class="pos-title">PIVÔ</div><select id="pivo"></select></div>
    </div>

    <button onclick="addGame()">Salvar jogo</button>
  </div>

  <div class="section">
    <h3>Jogos cadastrados</h3>
    <div id="games"></div>
  </div>
</div>

<div id="falcaoTela" style="display:none">
  <div class="section">
    <h3>Registro Falcão</h3>

    <label>Selecione o jogo</label>
    <select id="jogoFalcao"></select>

    <label>
      <input type="checkbox" id="falcaoCompleto">
      Falcão jogou o jogo completo
    </label>

    <label>Gols sofridos pelo Falcão</label>
    <select id="golsFalcao"></select>

    <label>Gols sofridos por outro goleiro</label>
    <select id="golsOutro"></select>

    <button onclick="salvarFalcao()">Salvar desempenho</button>
  </div>

  <div class="section">
    <h3>Resumo Falcão</h3>
    <div id="resumoFalcao"></div>
  </div>
</div>

</div>

<script>
let categoria="sub11";

let dados=JSON.parse(localStorage.getItem("copaFuracaoFalcaoCorrigido"))||{
  sub11:{times:[],jogadores:[],jogos:[]},
  sub12:{times:[],jogadores:[],jogos:[]},
  sub13:{times:[],jogadores:[],jogos:[]}
};

function salvar(){localStorage.setItem("copaFuracaoFalcaoCorrigido",JSON.stringify(dados));}

function trocarCategoria(cat,el){
  categoria=cat;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function mostrarTela(id,el){
  jogos.style.display="none";
  cadastros.style.display="none";
  falcaoTela.style.display="none";
  document.getElementById(id).style.display="block";
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  render();
}

function addTime(){
  let n=novoTime.value.trim();
  if(!n)return;
  dados[categoria].times.push(n);
  novoTime.value="";
  salvar();render();
}

function addJogador(){
  let n=novoJogador.value.trim();
  if(!n)return;
  dados[categoria].jogadores.push(n);
  novoJogador.value="";
  salvar();render();
}

function opcoesJogadores(){
  return '<option value="">Selecione</option>' +
  dados[categoria].jogadores.map(j=>`<option value="${j}">${j}</option>`).join("");
}

function opcoesGols(){
  let html="";
  for(let i=0;i<=20;i++) html+=`<option value="${i}">${i}</option>`;
  return html;
}

function addGame(){
  if(!timeB.value){alert("Selecione o adversário");return;}

  let jogo={
    timeB:timeB.value,
    golsA:Number(golsA.value||0),
    golsB:Number(golsB.value||0),
    craque:craque.value,
    campo:{
      gol:gol.value,
      fixo:fixo.value,
      alaEsq:alaEsq.value,
      alaDir:alaDir.value,
      meia:meia.value,
      pivo:pivo.value
    },
    falcaoCompleto:false,
    golsFalcao:0,
    golsOutro:0
  };

  dados[categoria].jogos.push(jogo);
  salvar();render();
}

function salvarFalcao(){
  let i=jogoFalcao.value;
  if(i===""){alert("Selecione um jogo");return;}

  dados[categoria].jogos[i].falcaoCompleto=falcaoCompleto.checked;
  dados[categoria].jogos[i].golsFalcao=Number(golsFalcao.value);
  dados[categoria].jogos[i].golsOutro=Number(golsOutro.value);

  salvar();render();
  alert("Desempenho salvo!");
}

function excluirJogo(i){
  if(confirm("Excluir jogo?")){
    dados[categoria].jogos.splice(i,1);
    salvar();render();
  }
}

function render(){
  let d=dados[categoria];

  listaTimes.innerHTML=d.times.map(t=>`<span class="badge">${t}</span>`).join("");
  listaJogadores.innerHTML=d.jogadores.map(j=>`<span class="badge">${j}</span>`).join("");

  timeB.innerHTML='<option value="">Selecione adversário</option>'+d.times.map(t=>`<option value="${t}">${t}</option>`).join("");
  craque.innerHTML=opcoesJogadores();

  gol.innerHTML=opcoesJogadores();
  fixo.innerHTML=opcoesJogadores();
  alaEsq.innerHTML=opcoesJogadores();
  alaDir.innerHTML=opcoesJogadores();
  meia.innerHTML=opcoesJogadores();
  pivo.innerHTML=opcoesJogadores();

  golsFalcao.innerHTML=opcoesGols();
  golsOutro.innerHTML=opcoesGols();

  jogoFalcao.innerHTML='<option value="">Selecione o jogo</option>'+
    d.jogos.map((j,i)=>`<option value="${i}">Furacão CL ${j.golsA} x ${j.golsB} ${j.timeB}</option>`).join("");

  let html="";
  d.jogos.forEach((g,i)=>{
    html+=`
    <div class="game">
      <b>Furacão CL ${g.golsA} x ${g.golsB} ${g.timeB}</b><br>
      Craque: ${g.craque || "-"}<br>
      GOL: ${g.campo.gol || "-"}<br>
      FIXO: ${g.campo.fixo || "-"}<br>
      ALA ESQ: ${g.campo.alaEsq || "-"}<br>
      ALA DIR: ${g.campo.alaDir || "-"}<br>
      MEIA: ${g.campo.meia || "-"}<br>
      PIVÔ: ${g.campo.pivo || "-"}<br>
      <button onclick="excluirJogo(${i})">Excluir</button>
    </div>`;
  });
  games.innerHTML=html || "Nenhum jogo cadastrado.";

  montarResumoFalcao();
}

function montarResumoFalcao(){
  let jogos=dados[categoria].jogos;
  let completos=jogos.filter(j=>j.falcaoCompleto).length;
  let golsF=jogos.reduce((s,j)=>s+(j.golsFalcao||0),0);
  let golsO=jogos.reduce((s,j)=>s+(j.golsOutro||0),0);

  resumoFalcao.innerHTML=`
    <p><b>Jogos completos:</b> ${completos}</p>
    <p><b>Gols sofridos Falcão:</b> ${golsF}</p>
    <p><b>Gols sofridos outro goleiro:</b> ${golsO}</p>
  `;
}

render();
</script>

</body>
</html>
