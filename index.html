<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Furacão</title>
<style>
body{margin:0;font-family:Arial;background:#080808;color:white}
header{background:#c8102e;padding:16px;text-align:center;font-size:22px;font-weight:bold}
.tabs,.nav{display:flex;background:#111}
.tab,.nav button{flex:1;padding:12px;font-weight:bold;border:none;color:white;background:#222;font-size:12px}
.tab.active,.nav button.active{background:#c8102e}
.container{padding:14px}
.section{background:#151515;margin-bottom:16px;padding:14px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none;text-align:center}
button{width:100%;padding:10px;margin-top:10px;background:#c8102e;color:white;border:none;border-radius:8px}
.game,.ranking{margin-top:10px;padding:10px;border-radius:8px;background:#222}
</style>
</head>

<body>

<header>Copa Furacão</header>

<div class="tabs">
  <div class="tab active" onclick="cat='sub11';render()">Sub11</div>
  <div class="tab" onclick="cat='sub12';render()">Sub12</div>
  <div class="tab" onclick="cat='sub13';render()">Sub13</div>
</div>

<div class="nav">
  <button onclick="tela='jogos';render()">Jogos</button>
  <button onclick="tela='outros';render()">Outros Jogos</button>
  <button onclick="tela='tabela';render()">Tabela</button>
  <button onclick="tela='falcao';render()">Falcão</button>
</div>

<div class="container" id="app"></div>

<script>
let cat="sub11";
let tela="jogos";

let dados={
  sub11:{times:["Furacão CL"],jogos:[],outros:[]},
  sub12:{times:["Furacão CL"],jogos:[],outros:[]},
  sub13:{times:["Furacão CL"],jogos:[],outros:[]}
};

function render(){
let d=dados[cat];
let html="";

if(tela==="jogos"){
html=`
<h3>Novo jogo Furacão</h3>
<input id="t" placeholder="Adversário">
<input id="ga" placeholder="Gols Furacão">
<input id="gb" placeholder="Gols adversário">
<button onclick="addJogo()">Salvar</button>

${d.jogos.map(g=>`<div class="game">Furacão ${g.ga} x ${g.gb} ${g.t}</div>`).join("")}
`;
}

if(tela==="outros"){
html=`
<h3>Outros jogos</h3>
<input id="t1" placeholder="Time A">
<input id="t2" placeholder="Time B">
<input id="g1" placeholder="Gols A">
<input id="g2" placeholder="Gols B">
<button onclick="addOutro()">Salvar</button>

${d.outros.map(g=>`<div class="game">${g.t1} ${g.g1} x ${g.g2} ${g.t2}</div>`).join("")}
`;
}

if(tela==="tabela"){
let tabela={};

function add(time,gp,gc){
if(!tabela[time])tabela[time]={gp:0,gc:0};
tabela[time].gp+=gp;
tabela[time].gc+=gc;
}

d.jogos.forEach(g=>{
add("Furacão CL",g.ga,g.gb);
add(g.t,g.gb,g.ga);
});

d.outros.forEach(g=>{
add(g.t1,g.g1,g.g2);
add(g.t2,g.g2,g.g1);
});

let arr=Object.entries(tabela).map(([t,v])=>({t,...v}));
arr.sort((a,b)=>a.gc-b.gc);

html=arr.map(t=>`<div class="ranking">${t.t}<br>GC:${t.gc}</div>`).join("");
}

if(tela==="falcao"){
let golsF=0;
let golsO=0;

d.jogos.forEach(j=>{
golsF+=Number(j.gf||0);
golsO+=Number(j.go||0);
});

let tabela={};

function add(time,gp,gc){
if(!tabela[time])tabela[time]={gp:0,gc:0};
tabela[time].gp+=gp;
tabela[time].gc+=gc;
}

d.jogos.forEach(g=>{
add("Furacão CL",g.ga,g.gb);
add(g.t,g.gb,g.ga);
});

d.outros.forEach(g=>{
add(g.t1,g.g1,g.g2);
add(g.t2,g.g2,g.g1);
});

let ranking=Object.entries(tabela).map(([t,v])=>({t,...v}));
ranking.sort((a,b)=>a.gc-b.gc);

html=`
<h3>Ranking menos vazado (geral)</h3>
${ranking.map(r=>`<div class="ranking">${r.t} - ${r.gc} gols sofridos</div>`).join("")}

<h3>Goleiros Furacão</h3>
<div class="ranking">Falcão: ${golsF} gols sofridos</div>
<div class="ranking">Outro goleiro: ${golsO} gols sofridos</div>
`;
}

app.innerHTML=html;
}

function addJogo(){
dados[cat].jogos.push({
t:t.value,
ga:Number(ga.value),
gb:Number(gb.value),
gf:prompt("Gols sofridos Falcão?")||0,
go:prompt("Gols sofridos outro goleiro?")||0
});
render();
}

function addOutro(){
dados[cat].outros.push({
t1:t1.value,
t2:t2.value,
g1:Number(g1.value),
g2:Number(g2.value)
});
render();
}

render();
</script>

</body>
</html>
